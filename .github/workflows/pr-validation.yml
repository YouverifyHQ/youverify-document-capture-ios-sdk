name: PR Validation

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Validate Swift package
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            .build/checkouts
            .build/repositories
            ~/Library/Caches/org.swift.swiftpm/repositories
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Swift version
        run: swift --version

      - name: Dump manifest
        run: swift package dump-package > /dev/null

      - name: Resolve package
        run: swift package resolve

      - name: Describe package
        run: swift package describe || true

  binary:
    name: Validate binary target
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@60606e260d2fc5762a71e64e74b2174e8ea3c8bd # v1.6.0
        with:
          xcode-version: latest-stable

      - name: Verify hosted XCFramework URL and checksum
        run: bash scripts/validate-binary-target.sh

  version-guard:
    name: Version and checksum guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: A version bump must ship a new checksum
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          DIFF="$(git diff "${BASE_SHA}"...HEAD -- Package.swift || true)"
          if [ -z "${DIFF}" ]; then
            echo "Package.swift unchanged - nothing to guard."
            exit 0
          fi
          VER_CHANGED=$(printf '%s\n' "${DIFF}" | grep -cE '^\+let version' || true)
          SUM_CHANGED=$(printf '%s\n' "${DIFF}" | grep -cE '^\+let checksum' || true)
          echo "version line changed: ${VER_CHANGED}; checksum line changed: ${SUM_CHANGED}"
          if [ "${VER_CHANGED}" -ge 1 ] && [ "${SUM_CHANGED}" -lt 1 ]; then
            echo "::error::'let version' changed but 'let checksum' did not. Update the binary checksum in the same PR."
            exit 1
          fi
          if [ "${SUM_CHANGED}" -ge 1 ] && [ "${VER_CHANGED}" -lt 1 ]; then
            echo "::warning::'let checksum' changed without a version bump. Confirm this is an intentional artifact correction."
          fi

  docs:
    name: Docs lint and links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Require core docs
        run: |
          set -euo pipefail
          for f in README.md CHANGELOG.md LICENSE SECURITY.md CONTRIBUTING.md RELEASE.md; do
            [ -f "$f" ] || { echo "::error::Required file missing: $f"; exit 1; }
          done

      - name: Reject CocoaPods install instructions
        run: |
          set -euo pipefail
          if grep -RniE "pod +install|podfile|pod +['\"]|post_install" README.md Docs CONTRIBUTING.md RELEASE.md 2>/dev/null; then
            echo "::error::CocoaPods install instructions found. These SDKs are distributed through Swift Package Manager only."
            exit 1
          fi

      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@05f32210e84442804257b2a6f20b273450ec8265 # v19.1.0
        with:
          globs: |
            **/*.md
            !CHANGELOG.md
            !Examples/**

      - name: Link check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: "--no-progress --max-concurrency 4 --accept 200,206,429 README.md SECURITY.md CONTRIBUTING.md RELEASE.md Docs/*.md"
          fail: true

  pr-title:
    name: Conventional PR title
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            ci
            build
            refactor
            test
            revert
            release
