name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Tag and publish on version bump
    runs-on: macos-14
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: latest-stable

      - name: Derive version and tag from manifest
        id: ver
        run: |
          set -euo pipefail
          URL="$(swift package dump-package | jq -r '.targets[] | select(.type=="binary") | .url' | head -n1)"
          VERSION="$(printf '%s' "$URL" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -n1)"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not derive a semantic version from the binary URL: $URL"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Skip if this version is already released
        id: guard
        run: |
          set -euo pipefail
          git fetch --tags --force --quiet
          TAG="${{ steps.ver.outputs.tag }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            echo "$TAG already exists - release skipped."
          else
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
            echo "$TAG does not exist - release will be created."
          fi

      - name: Verify hosted binary before tagging
        if: steps.guard.outputs.release_needed == 'true'
        run: bash scripts/validate-binary-target.sh

      - name: Create and push tag
        if: steps.guard.outputs.release_needed == 'true'
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Publish GitHub Release
        if: steps.guard.outputs.release_needed == 'true'
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          gh release create "$TAG" --title "$TAG" --generate-notes --verify-tag --latest

      - name: Sync CHANGELOG.md
        if: steps.guard.outputs.release_needed == 'true'
        run: |
          set -euo pipefail
          TAG="${{ steps.ver.outputs.tag }}"
          VERSION="${{ steps.ver.outputs.version }}"
          if grep -qF "## [$VERSION]" CHANGELOG.md; then
            echo "CHANGELOG already has $VERSION - skipping."
            exit 0
          fi
          NOTES="$(gh release view "$TAG" --json body --jq .body)"
          DATE="$(date +%F)"
          HEADER_END="$(grep -nE '^## ' CHANGELOG.md | head -n1 | cut -d: -f1 || true)"
          {
            if [ -n "$HEADER_END" ]; then
              head -n "$((HEADER_END - 1))" CHANGELOG.md
            else
              cat CHANGELOG.md
              echo ""
            fi
            echo "## [$VERSION] - $DATE"
            echo ""
            printf '%s\n' "$NOTES"
            echo ""
            if [ -n "$HEADER_END" ]; then
              tail -n +"$HEADER_END" CHANGELOG.md
            fi
          } > CHANGELOG.next.md
          mv CHANGELOG.next.md CHANGELOG.md
          git add CHANGELOG.md
          git commit -m "docs(changelog): $TAG [skip ci]"
          git fetch origin master --quiet
          git rebase origin/master || git rebase --abort || true
          git push origin HEAD:master || echo "::warning::Could not push CHANGELOG sync. GitHub Release notes remain canonical."
